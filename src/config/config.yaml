app:
  name: "DevOps Chatbot Assistant"
  version: "1.0.0"
  environment: ${APP_ENV}
  port: ${APP_PORT}

ai:
  model: "gemini-2.0-flash"
  max_tokens: ${MAX_TOKENS}
  temperature: 0.7

session:
  ttl_seconds: ${SESSION_TTL}
  max_history: 10

logging:
  level: INFO
  format: json

rate_limiting:
  enabled: true
  requests_per_minute: 30
