apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-config
  namespace: default
data:
  APP_ENV: "production"
  APP_PORT: "8000"
  MAX_TOKENS: "1024"
  SESSION_TTL: "3600"
---
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: default
type: Opaque
stringData:
  GEMINI_API_KEY: "YOUR_API_KEY_HERE"
