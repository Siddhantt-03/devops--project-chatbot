# Nagios Configuration for DevOps Chatbot
# Student: Siddhant Pandey | 23FE10CSE00011

define host {
    use                     linux-server
    host_name               devops-chatbot
    alias                   DevOps Chatbot Assistant
    address                 chatbot
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               devops-chatbot
    service_description     HTTP Health Check
    check_command           check_http!-p 8000 -u /health -e "healthy"
    check_interval          2
    retry_interval          1
    max_check_attempts      3
    notification_interval   10
}

define service {
    use                     generic-service
    host_name               devops-chatbot
    service_description     HTTP Response Time
    check_command           check_http!-p 8000 -u /health -w 2 -c 5
    check_interval          5
    retry_interval          2
    max_check_attempts      3
}

define contact {
    contact_name            siddhant
    alias                   Siddhant Pandey
    email                   23FE10CSE00011@example.edu
    service_notification_period    24x7
    host_notification_period       24x7
    service_notification_options   w,u,c,r
    host_notification_options      d,u,r
    service_notification_commands  notify-service-by-email
    host_notification_commands     notify-host-by-email
}
