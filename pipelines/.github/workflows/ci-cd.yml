name: CI/CD Pipeline - DevOps Chatbot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: siddhantpandey/devops-chatbot
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r src/main/requirements.txt

    - name: Lint with flake8
      run: flake8 src/main/app/ --max-line-length=120

    - name: Check formatting with Black
      run: black --check src/main/app/

    - name: Run unit tests
      run: pytest tests/unit/ -v --cov=src/main/app --cov-report=xml
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report
        path: coverage.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: |
        docker build \
          -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
          -t ${{ env.DOCKER_IMAGE }}:latest \
          -f infrastructure/docker/Dockerfile .

    - name: Security scan with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.DOCKER_IMAGE }}:latest
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Save Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image-meta
        path: |
          infrastructure/docker/Dockerfile
          infrastructure/docker/docker-compose.yml

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -r src/main/requirements.txt

    - name: Run integration tests
      run: pytest tests/integration/ -v
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to DockerHub (staging tag)
      run: |
        docker build -t ${{ env.DOCKER_IMAGE }}:staging \
          -f infrastructure/docker/Dockerfile .
        docker push ${{ env.DOCKER_IMAGE }}:staging

    - name: Deploy to staging
      run: echo "Deploying to staging environment..."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://your-production-url

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to DockerHub (latest)
      run: |
        docker build \
          -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
          -t ${{ env.DOCKER_IMAGE }}:latest \
          -f infrastructure/docker/Dockerfile .
        docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        docker push ${{ env.DOCKER_IMAGE }}:latest

    - name: Deploy to Kubernetes
      run: |
        echo "Applying Kubernetes manifests..."
        kubectl apply -f infrastructure/kubernetes/
